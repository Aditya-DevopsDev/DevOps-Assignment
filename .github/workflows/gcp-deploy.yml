name: GCP Deploy Backend

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: devops-assignment-gcp-488910   # ✅ FIXED
  REGION: asia-south1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/928600051964/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-cloudrun-deployer@devops-assignment-gcp-488910.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Set environment variables
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "REPO=prod-backend-repo" >> $GITHUB_ENV
            echo "SERVICE=prod-backend-service" >> $GITHUB_ENV
          else
            echo "REPO=backend-repo" >> $GITHUB_ENV
            echo "SERVICE=backend-service" >> $GITHUB_ENV
          fi

      - name: Build and Push Image
        run: |
          IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/backend:${GITHUB_SHA}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image=$IMAGE_URI \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --quiet